server:
  port: 8080

spring:
  application:
    name: gateway-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# ==================== DEBUG ====================
logging:
  level:
    org.springframework.cloud.gateway.server.mvc: DEBUG
    org.springframework.web.servlet.function: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"