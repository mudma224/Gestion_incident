server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: file:///C:/Users/E L I T E B O O K/Desktop/incidents-app/config-repo
          # Remplace par le chemin absolu vers ton dossier config-repo
          # Exemple Windows : file:///C:/projets/incidents-app/config-repo
          # Exemple Linux/Mac : file:///home/user/incidents-app/config-repo
          default-label: main
          clone-on-start: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh